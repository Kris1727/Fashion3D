<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Fashion3D</title>
    <link rel="shortcut icon" href="images/favicon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Fashion3D</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="catalog.html">Catalog</a></li>
        </ul>
    </nav>

    <section class="catalog">
        <h1>Clothing Catalog</h1>
        <div class="catalog-grid">

            <div class="catalog-card">
                <img id="dressSlider" src="images/casual.png" alt="Dress">
                <h2 id="dressTitle">Casual Dress</h2>
                <p id="dressDescription">Comfortable casual dress.</p>
                <a href="dresses.html"><button>Open Catalog</button></a>
            </div>

            <div class="catalog-card">
                <img id="suitSlider" src="images/suit1.png" alt="Suit">
                <h2 id="suitTitle">Business Style Suit</h2>
                <p id="suitDescription">Elegant business fashion.</p>
                <a href="suits.html"><button>Open Catalog</button></a>
            </div>

            <div class="catalog-card">
                <img id="urbanSlider" src="images/urban1.png" alt="Urban">
                <h2 id="urbanTitle">Modern Urban Fashion</h2>
                <p id="urbanDescription">Modern casual streetwear style.</p>
                <a href="urban.html"><button>Open Catalog</button></a>
            </div>

        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
